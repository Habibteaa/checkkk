<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter For You</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-neon: #FF8FB0;
            --pink-deep: #F4A7B9;
            --cream-base: #FDFBF7;
        }

        body {
            background: radial-gradient(120% 90% at 50% -10%, #FDFBF7 0%, #F5EFEB 55%, #E8DDD2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Special Elite', cursive;
        }

        .paper {
            background: #FFFBF0;
            width: 88%;
            max-width: 680px;
            max-height: 80vh;
            overflow-y: auto;
            padding: clamp(28px, 5vw, 50px);
            border: 1px solid #E8DDD2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            transform: translateY(100vh);
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s;
            box-sizing: border-box;
        }

        .paper.slide-in { transform: translateY(0); }

        #text-content { 
            white-space: pre-wrap; 
            line-height: 1.7; 
            color: #2D1A1D; 
            font-size: clamp(1.35rem, 3vw, 1.65rem);
            font-weight: 500;
        }

        #cursor { 
            display: inline-block; 
            width: 3px; 
            height: 1.3em; 
            background: #2D1A1D; 
            animation: blink 1s infinite; 
            vertical-align: sub;
        }
        @keyframes blink { 50% { opacity: 0; } }

        #signature-svg { width: 220px; height: 70px; margin-top: 24px; display: block; }
        .path { stroke-dasharray: 1000; stroke-dashoffset: 1000; }
        .draw-sig { animation: draw 2s forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        .continue-btn {
            margin-top: 4vh;
            display: flex; align-items: center; justify-content: center;
            width: 106px; height: 106px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
            box-shadow: 0 1px 0 rgba(255,255,255,.5) inset, 0 14px 28px -10px rgba(244,167,185,.7);
            border: none;
            cursor: pointer;
            transition: box-shadow .25s ease, filter .25s ease, opacity 0.6s ease;
            animation: arrowFloat 2.4s ease-in-out infinite;
            opacity: 0;
            visibility: hidden;
            text-decoration: none;
            position: relative;
        }

        .continue-btn::before {
            content: '';
            position: absolute; inset: -12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
            opacity: .4;
            filter: blur(14px);
            z-index: -1;
            animation: arrowGlowPulse 2.4s ease-in-out infinite;
        }

        .continue-btn svg { width: 42px; height: 42px; color: var(--cream-base); }
        .continue-btn.show { opacity: 1; visibility: visible; }
        .continue-btn:hover { box-shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 20px 40px -10px rgba(255,143,176,.85); filter: brightness(1.07); }
        
        @keyframes arrowFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
        @keyframes arrowGlowPulse { 0%,100% { opacity: .3; transform: scale(1); } 50% { opacity: .6; transform: scale(1.18); } }
    </style>
</head>
<body>

    <audio id="typewriterAudio" src="typemusic.mpeg" preload="auto"></audio>

    <div class="paper" id="paper">
        <div id="text-content">Dear Scarlet,

</div>
        <span id="cursor"></span>
        
        <svg id="signature-svg">
            <path id="sig-path" class="path" d="M10,40 C50,10 100,50 150,20" fill="none" stroke="#8B6969" stroke-width="2.5"/>
            <path id="heart-path" class="path" d="M170,30 Q180,10 190,30 T200,30" fill="none" stroke="#FF69B4" stroke-width="2.5"/>
        </svg>
    </div>

    <a href="guitar.html" id="nextBtn" class="continue-btn" aria-label="Continue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
        </svg>
    </a>

    <script>
        const text = `I still remember the first moment I saw you... it felt like the world slowed down just to let me catch my breath. 

Every day since then has been a gift, and I find myself falling for you more deeply with every passing second. You are the best thing that has ever happened to me, Scarlet.

I love you more than words can ever truly capture.

~ Peter`;

        const content = document.getElementById('text-content');
        const cursor = document.getElementById('cursor');
        const audio = document.getElementById('typewriterAudio');
        const paper = document.getElementById('paper');

        async function typeLetter() {
            // Trigger audio
            audio.play().catch(e => console.log("Audio play blocked until interaction"));

            for (let char of text) {
                content.innerHTML += char;
                paper.scrollTop = paper.scrollHeight; // Keep view auto-scrolled as text types
                let delay = Math.random() * 20 + 50; 
                if (char === '.' || char === ',') delay = 400;
                if (char === '\n') delay = 600;
                await new Promise(resolve => setTimeout(resolve, delay));
            }
            
            cursor.style.display = 'none';
            document.getElementById('sig-path').classList.add('draw-sig');
            document.getElementById('heart-path').classList.add('draw-sig');
            
            // Wait for signature animation (2s), fade out audio, show button
            setTimeout(() => {
                let fadeAudio = setInterval(() => {
                    if (audio.volume > 0.05) {
                        audio.volume -= 0.05;
                    } else {
                        audio.pause();
                        audio.volume = 1;
                        clearInterval(fadeAudio);
                    }
                }, 50);

                document.getElementById('nextBtn').classList.add('show');
                paper.style.boxShadow = "0 0 25px rgba(255, 105, 180, 0.35)";
            }, 2000);
        }

        window.onload = () => {
            paper.classList.add('slide-in');
            setTimeout(typeLetter, 1500);
        };
    </script>
</body>
</html>
