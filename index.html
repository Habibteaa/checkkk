<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Can You Solve This Surprise?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,900;1,600&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Berkshire+Swash&display=swap" rel="stylesheet">
<style>
  :root{
    --cream-base:#FDFBF7;
    --cream-deep:#F5EFEB;
    --taupe:#E8DDD2;
    --pink-soft:#FFD1DC;
    --pink-deep:#F4A7B9;
    --pink-neon:#FF8FB0;
    --brown-primary:#362214;
    --brown-muted:#9C7B67;
    --metal-1:#F3ECE4;
    --metal-2:#DACDBF;
    --leaf-soft:#C7D6B8;
    --leaf-deep:#A8BC93;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(120% 90% at 50% -10%, var(--cream-base) 0%, var(--cream-deep) 55%, var(--taupe) 100%);
    font-family:'DM Sans', sans-serif;
    color:var(--brown-primary);
    overflow:hidden;
    position:relative;
  }
  .glow-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    opacity:.55;
    pointer-events:none;
    z-index:0;
    animation:drift 18s ease-in-out infinite alternate;
  }
  .glow-blob.a{ width:420px;height:420px; background:var(--pink-soft); top:-120px; left:-100px; }
  .glow-blob.b{ width:380px;height:380px; background:var(--pink-deep); bottom:-140px; right:-100px; animation-delay:3s; }
  .glow-blob.c{ width:260px;height:260px; background:var(--taupe); top:40%; left:60%; animation-delay:6s; }
  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(30px,-20px) scale(1.08); }
  }

  #surprise-text{
    position: absolute;
    top: 4vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Berkshire Swash', cursive;
    font-size: clamp(1.6rem, 4.4vw, 3rem);
    font-weight: 400;
    letter-spacing: .02em;
    white-space: nowrap;
    background: linear-gradient(135deg, #5c2e16, #bd6528, var(--pink-neon), #5c2e16);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer{
    0%   { background-position: 0%   center; }
    100% { background-position: 200% center; }
  }

  @keyframes sparkleTwinkle{
    0%,100%{ opacity:0; transform:scale(.3) rotate(0deg); }
    50%{ opacity:1; transform:scale(1.1) rotate(180deg); }
  }

  .stage{
    position:relative;
    z-index:10;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(14px, 2.6vh, 26px);
    padding:clamp(14px, 4vh, 40px) 16px;
    text-align:center;
    padding-top: clamp(70px, 12vh, 110px);
  }

  .puzzle-wrap{
    position:relative;
    width:min(78vw, 58vh, 440px);
    aspect-ratio:1/1;
  }
  .puzzle-grid{
    position:relative;
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:7px;
    padding:7px;
    border-radius:20px;
    background:linear-gradient(180deg, var(--metal-1), var(--metal-2));
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 18px 40px -16px rgba(54,34,20,.35);
  }
  .piece{
    position:relative;
    border-radius:6px;
    background-repeat:no-repeat;
    box-shadow:
      0 0 0 1px rgba(54,34,20,.18) inset,
      0 2px 4px rgba(54,34,20,.18);
    touch-action:none;
    cursor:grab;
    transition:box-shadow .25s ease, transform .18s ease;
  }
  .piece.lifted{ opacity:.25; }
  .piece.correct{
    box-shadow:
      0 0 0 1.5px rgba(168,188,147,.9) inset,
      0 2px 4px rgba(54,34,20,.18);
  }
  .piece-ghost{
    position:fixed;
    z-index:999;
    border-radius:6px;
    pointer-events:none;
    background-repeat:no-repeat;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 16px 30px -10px rgba(54,34,20,.5);
    transform:scale(1.06) rotate(-1.5deg);
  }
  .puzzle-grid.solved .piece{ cursor:default; }
  .solved-glow{
    position:absolute;
    inset:-10px;
    border-radius:26px;
    pointer-events:none;
    opacity:0;
    background:radial-gradient(circle, rgba(255,209,220,.9) 0%, rgba(255,143,176,.5) 45%, transparent 75%);
    filter:blur(18px);
    transition:opacity .6s ease;
  }
  .puzzle-wrap .solved-glow.show{ opacity:.9; animation:solvedPulse 2.2s ease-in-out infinite; }
  @keyframes solvedPulse{
    0%,100%{ filter:blur(18px) brightness(1); }
    50%{ filter:blur(24px) brightness(1.15); }
  }
  .solved-sparkle{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:radial-gradient(circle, #FFFFFF 0%, var(--pink-neon) 55%, transparent 75%);
    opacity:0;
    pointer-events:none;
    animation:sparkleTwinkle 1.6s ease-in-out infinite;
  }

  /* ── CHANGE 1: arrow button moved lower via larger margin-top ── */
  .continue-btn{
    margin-top: 80px;
    display:flex;
    align-items:center;
    justify-content:center;
    width: 106px;
    height: 106px;
    border-radius:50%;
    position:relative;
    background:linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    box-shadow:
      0 1px 0 rgba(255,255,255,.5) inset,
      0 14px 28px -10px rgba(244,167,185,.7);
    text-decoration:none;
    cursor:pointer;
    animation:arrowFloat 2.4s ease-in-out infinite;
    transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
  }
  .continue-btn::before{
    content:'';
    position:absolute;
    inset:-12px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--pink-neon), var(--pink-deep));
    opacity:.4;
    filter:blur(14px);
    z-index:-1;
    animation:arrowGlowPulse 2.4s ease-in-out infinite;
  }
  .continue-btn svg{
    width: 42px;
    height: 42px;
    color:var(--cream-base);
    transition:transform .25s ease;
  }
  .continue-btn:hover{
    transform:translateY(-5px) scale(1.08) rotate(-4deg);
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 20px 40px -10px rgba(255,143,176,.85);
    filter:brightness(1.05);
  }
  .continue-btn:hover svg{ transform:translateX(4px) rotate(8deg); }
  .continue-btn:active{ transform:translateY(-2px) scale(.95); }
  @keyframes arrowFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }
  @keyframes arrowGlowPulse{
    0%,100%{ opacity:.3; transform:scale(1); }
    50%{ opacity:.6; transform:scale(1.18); }
  }

  .garden-ambient{
    position:fixed;
    left:0; right:0; bottom:0;
    height:150px;
    z-index:1;
    pointer-events:none;
    opacity:.55;
  }
  .ground{
    position:absolute;
    left:0; right:0; bottom:0;
    height:44px;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:linear-gradient(180deg, var(--metal-1), var(--metal-2));
    opacity:.85;
  }
  .flower-row{
    position:absolute;
    left:0; right:0; bottom:46px;
    display:flex;
    align-items:flex-end;
    justify-content:space-evenly;
    height:100%;
  }
  .flower{
    --tilt:0deg;
    opacity:0;
    transform:scale(0) translateY(22px) rotate(var(--tilt));
    transform-origin:bottom center;
    animation:popUpBounce 1s cubic-bezier(.34,1.62,.5,1) forwards;
  }
  .flower svg{
    display:block;
    overflow:visible;
    filter:drop-shadow(0 4px 5px rgba(54,34,20,.20));
    transform:scale(.62);
  }
  .flower:nth-child(1){ --tilt:-5deg; animation-delay:.2s; }
  .flower:nth-child(2){ --tilt:3deg;  animation-delay:.55s; }
  .flower:nth-child(3){ --tilt:-2deg; animation-delay:.9s; }
  @keyframes popUpBounce{
    0%{   opacity:0;   transform:scale(0)    translateY(22px) rotate(var(--tilt)); }
    45%{  opacity:1;   transform:scale(1.18) translateY(-10px) rotate(var(--tilt)); }
    65%{  opacity:1;   transform:scale(.93)  translateY(3px)  rotate(var(--tilt)); }
    82%{  opacity:1;   transform:scale(1.05) translateY(-3px) rotate(var(--tilt)); }
    100%{ opacity:1;   transform:scale(1)    translateY(0)    rotate(var(--tilt)); }
  }
  .flower-sway{ transform-origin:bottom center; animation:windSwayA 4.6s ease-in-out infinite; }
  .flower:nth-child(2) .flower-sway{ animation:windSwayB 5.4s ease-in-out infinite; }
  .flower:nth-child(3) .flower-sway{ animation:windSwayC 3.9s ease-in-out infinite; }
  @keyframes windSwayA{
    0%{transform:rotate(0deg);} 16%{transform:rotate(1.8deg);} 33%{transform:rotate(2.6deg);}
    50%{transform:rotate(0deg);} 66%{transform:rotate(-1.8deg);} 83%{transform:rotate(-2.6deg);} 100%{transform:rotate(0deg);}
  }
  @keyframes windSwayB{
    0%{transform:rotate(0deg);} 16%{transform:rotate(2.4deg);} 33%{transform:rotate(3.4deg);}
    50%{transform:rotate(0deg);} 66%{transform:rotate(-2.4deg);} 83%{transform:rotate(-3.4deg);} 100%{transform:rotate(0deg);}
  }
  @keyframes windSwayC{
    0%{transform:rotate(0deg);} 16%{transform:rotate(1.3deg);} 33%{transform:rotate(1.9deg);}
    50%{transform:rotate(0deg);} 66%{transform:rotate(-1.3deg);} 83%{transform:rotate(-1.9deg);} 100%{transform:rotate(0deg);}
  }
  @media (max-width:560px), (max-height:680px){
    .garden-ambient{ height:110px; opacity:.4; }
    .flower-row{ bottom:34px; }
    .flower svg{ transform:scale(.5); }
    .stage{ gap:12px; }
  }
  @media (prefers-reduced-motion: reduce){
    .glow-blob, #surprise-text,
    .flower-sway, .continue-btn, .continue-btn::before,
    .flower, .solved-sparkle{ animation:none !important; }
    .flower{ opacity:1; transform:rotate(var(--tilt)); }
  }
</style>
</head>

  <main class="stage">
    <div class="puzzle-wrap">
      <div class="puzzle-grid" id="puzzleGrid"></div>
      <div class="solved-glow" id="solvedGlow"></div>
    </div>

    <a href="letter.html" class="continue-btn" aria-label="Continue to the next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
      </svg>
    </a>

  <script>
    const IMAGE_SRC = "puzzpic.jpeg";
    const SIZE = 4;
    const TOTAL = SIZE * SIZE;

    const grid = document.getElementById('puzzleGrid');
    const solvedGlow = document.getElementById('solvedGlow');

    let order = [...Array(TOTAL).keys()];
    let solved = false;

    function shuffle(arr){
      let a = arr.slice();
      do{
        for(let i = a.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
      } while(a.every((v,i) => v === i));
      return a;
    }

    function buildGrid(){
      grid.innerHTML = '';
      for(let i = 0; i < TOTAL; i++){
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.dataset.slot = i;
        grid.appendChild(piece);
      }
    }

    function render(){
      const pieces = grid.querySelectorAll('.piece');
      pieces.forEach((piece) => {
        const slot = parseInt(piece.dataset.slot);
        const pieceId = order[slot];
        const col = pieceId % SIZE;
        const row = Math.floor(pieceId / SIZE);
        piece.style.backgroundImage = `url("${IMAGE_SRC}")`;
        piece.style.backgroundSize = `${SIZE * 100}% ${SIZE * 100}%`;
        piece.style.backgroundPosition = `${(col / (SIZE - 1)) * 100}% ${(row / (SIZE - 1)) * 100}%`;
        piece.classList.toggle('correct', pieceId === slot && !solved);
      });
    }

    function checkComplete(){
      if(order.every((v,i) => v === i)){
        solved = true;
        grid.classList.add('solved');
        solvedGlow.classList.add('show');
        spawnSparkles();
        render();
      }
    }

    function spawnSparkles(){
      const wrap = document.querySelector('.puzzle-wrap');
      for(let i = 0; i < 14; i++){
        const s = document.createElement('div');
        s.className = 'solved-sparkle';
        s.style.left = (Math.random() * 92 + 4) + '%';
        s.style.top = (Math.random() * 92 + 4) + '%';
        s.style.animationDelay = (Math.random() * 1.4) + 's';
        wrap.appendChild(s);
      }
    }

    let dragging = null;

    grid.addEventListener('pointerdown', (e) => {
      if(solved) return;
      const piece = e.target.closest('.piece');
      if(!piece) return;
      const rect = piece.getBoundingClientRect();
      const ghost = document.createElement('div');
      ghost.className = 'piece-ghost';
      ghost.style.width = rect.width + 'px';
      ghost.style.height = rect.height + 'px';
      ghost.style.backgroundImage = piece.style.backgroundImage;
      ghost.style.backgroundSize = piece.style.backgroundSize;
      ghost.style.backgroundPosition = piece.style.backgroundPosition;
      ghost.style.left = rect.left + 'px';
      ghost.style.top = rect.top + 'px';
      document.body.appendChild(ghost);

      dragging = {
        source: parseInt(piece.dataset.slot),
        ghost,
        offsetX: e.clientX - rect.left,
        offsetY: e.clientY - rect.top,
        pointerId: e.pointerId
      };
      piece.classList.add('lifted');
      piece.setPointerCapture(e.pointerId);
    });

    window.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      dragging.ghost.style.left = (e.clientX - dragging.offsetX) + 'px';
      dragging.ghost.style.top = (e.clientY - dragging.offsetY) + 'px';
    });

    function endDrag(e){
      if(!dragging) return;
      const sourceEl = grid.querySelector(`[data-slot="${dragging.source}"]`);
      sourceEl.classList.remove('lifted');
      dragging.ghost.remove();

      const x = e.clientX, y = e.clientY;
      const targetEl = document.elementFromPoint(x, y)?.closest('.piece');
      if(targetEl){
        const t = parseInt(targetEl.dataset.slot);
        if(t !== dragging.source){
          [order[dragging.source], order[t]] = [order[t], order[dragging.source]];
          render();
          checkComplete();
        }
      }
      dragging = null;
    }

    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);

    buildGrid();
    order = shuffle(order);
    render();
  </script>
</body>
</html>
